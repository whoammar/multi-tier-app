name: Deploy Full Stack App

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # --- CHECKOUT ---
      - name: Checkout code
        uses: actions/checkout@v4

      # --- CONFIGURE AWS ---
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # --- FRONTEND DEPLOY ---
      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Upload frontend to S3
        run: |
          aws s3 sync frontend/build s3://${{ secrets.S3_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      # --- BACKEND DEPLOY TO ECR ---
      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker image
        run: |
          docker build -t ${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest ./backend
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest

      # --- DEPLOY BACKEND ON EC2 ---
      - name: Deploy backend on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # 1. Login to ECR on EC2
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ steps.ecr-login.outputs.registry }}

            # 2. Stop & remove old container
            docker stop backend || true
            docker rm -f backend || true

            # 3. Pull latest image
            docker pull ${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest

            # 4. Run new container
            docker run -d \
              --name backend \
              --restart unless-stopped \
              -p 8080:8080 \
              ${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest

            # 5. Clean up unused images
            docker image prune -f